services:
  lead-processor:
    build: .
    image: lead-processor:latest
    container_name: lead-processor
    ports:
      # Host port is assigned randomly; container still listens on 3000
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/data
      - MASTER_PASSWORD=${MASTER_PASSWORD:?Set MASTER_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - lead-processor-data:/data
    restart: unless-stopped

volumes:
  lead-processor-data:
